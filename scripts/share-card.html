<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:900px;height:1200px;background:#fff;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;display:flex;align-items:center;justify-content:center;position:relative}
.bg-layer{position:absolute;top:0;left:0;width:900px;height:1200px;opacity:0.20;object-fit:cover;z-index:0}
.card{position:relative;z-index:1;width:720px;text-align:center}
.slogan{font-size:24px;font-weight:400;color:#8e8e93;letter-spacing:-0.01em;margin-bottom:48px}
.qr-section{text-align:center;margin-bottom:28px}
.qr-section img{width:70px;height:70px;border-radius:8px}
.footer{font-size:12px;font-weight:500;color:#c7c7cc;letter-spacing:-0.01em;margin-bottom:24px}
</style>
</head>
<body>
<div class="card">
  <div class="topic">{{TOPIC}}</div>
  <div class="grid">
    <div class="panel"><div class="num">{{WORDS}}</div><div class="label">{{LABEL_WORDS}}</div></div>
    <div class="panel"><div class="num">{{NOTES}}</div><div class="label">{{LABEL_NOTES}}</div></div>
    <div class="panel"><div class="num">{{QUESTIONS}}</div><div class="label">{{LABEL_QUESTIONS}}</div></div>
    <div class="panel"><div class="num">{{LINKS}}</div><div class="label">{{LABEL_LINKS}}</div></div>
  </div>
  <div class="sep"></div>
  <div class="slogan">{{SLOGAN}}</div>
  <div class="footer">VaultForge v3.0.0</div>
  <div class="qr-section">
    <img src="{{QR_URL}}" alt="QR">
  </div>
</div>
</body>
</html>
