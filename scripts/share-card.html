<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:900px;height:900px;background:#fff;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;display:flex;align-items:center;justify-content:center;position:relative}

.sep{width:60px;height:3px;background:#F08800;border-radius:2px;margin:0 auto 48px}
.slogan{font-size:24px;font-weight:400;color:#8e8e93;letter-spacing:-0.01em;margin-bottom:48px}
.qr-section{text-align:center;margin-bottom:28px}
.qr-section img{width:70px;height:70px;border-radius:8px}
.footer{font-size:12px;font-weight:500;color:#c7c7cc;letter-spacing:-0.01em;margin-bottom:24px}
