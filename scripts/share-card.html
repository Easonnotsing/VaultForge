<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:900px;background:#fff;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;display:flex;align-items:center;justify-content:center;position:relative}
.card{width:880px;text-align:center}
.topic{font-size:44px;font-weight:600;letter-spacing:-0.02em;color:#1d1d1f;margin-bottom:56px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:56px}
.panel{background:#f5f5f7;border-radius:18px;padding:36px 0;text-align:center}
.panel .num{font-size:56px;font-weight:600;letter-spacing:-0.03em;color:#1d1d1f;line-height:1}
.panel .label{font-size:15px;font-weight:500;color:#86868b;margin-top:10px;letter-spacing:-0.01em}
.sep{width:80px;height:3px;background:#F08800;border-radius:2px;margin:0 auto 44px}
.slogan{font-size:21px;font-weight:400;color:#8e8e93;letter-spacing:-0.01em;margin-bottom:32px}
.footer{font-size:13px;font-weight:500;color:#aeaeb2;letter-spacing:-0.01em}
</style>
</head>
<body>
<div class="card">
  <div class="topic">{{TOPIC}}</div>
  <div class="grid">
    <div class="panel"><div class="num">{{WORDS}}</div><div class="label">{{LABEL_WORDS}}</div></div>
    <div class="panel"><div class="num">{{NOTES}}</div><div class="label">{{LABEL_NOTES}}</div></div>
    <div class="panel"><div class="num">{{QUESTIONS}}</div><div class="label">{{LABEL_QUESTIONS}}</div></div>
    <div class="panel"><div class="num">{{LINKS}}</div><div class="label">{{LABEL_LINKS}}</div></div>
  </div>
  <div class="sep"></div>
  <div class="slogan">{{SLOGAN}}</div>
  <div class="footer">VaultForge v3.0.0</div>
</div>
</body>
</html>
