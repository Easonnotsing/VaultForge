<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#fff;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;display:flex;align-items:center;justify-content:center;position:relative;-webkit-font-smoothing:antialiased}
.bg-layer{position:absolute;top:0;left:0;width:1200px;height:630px;opacity:0.05;object-fit:cover;z-index:0;filter:grayscale(100%)}
.card{position:relative;z-index:1;width:960px;text-align:center}
.logo{width:56px;height:56px;background:#0071e3;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:36px}
.logo span{font-size:26px;font-weight:700;color:#fff;letter-spacing:-0.02em}
.topic{font-size:44px;font-weight:600;letter-spacing:-0.02em;margin-bottom:48px;color:#1d1d1f}
.stats{display:flex;justify-content:center;gap:80px;margin-bottom:52px}
.stat-item{text-align:center;min-width:100px}
.stat-item .num{font-size:56px;font-weight:600;letter-spacing:-0.04em;color:#1d1d1f;line-height:1}
.stat-item .label{font-size:15px;font-weight:500;color:#86868b;margin-top:10px;letter-spacing:-0.01em}
.sep{width:120px;height:1px;background:#e5e5ea;margin:0 auto 40px}
.slogan{font-size:21px;font-weight:400;color:#8e8e93;letter-spacing:-0.01em;margin-bottom:32px}
.footer{font-size:13px;font-weight:500;color:#aeaeb2;letter-spacing:-0.01em}
.divider{width:1px;height:40px;background:#e5e5ea;align-self:center}
</style></head><body>
{{GRAPH_BG}}
<div class="card">
  <div class="logo"><span>V</span></div>
  <div class="topic">{{TOPIC}}</div>
  <div class="stats">
    <div class="stat-item"><div class="num">{{NOTES}}</div><div class="label">{{LABEL_NOTES}}</div></div>
    <div class="divider"></div>
    <div class="stat-item"><div class="num">{{LINKS}}</div><div class="label">{{LABEL_LINKS}}</div></div>
    <div class="divider"></div>
    <div class="stat-item"><div class="num">{{WORDS}}</div><div class="label">{{LABEL_WORDS}}</div></div>
    <div class="divider"></div>
    <div class="stat-item"><div class="num">{{QUESTIONS}}</div><div class="label">{{LABEL_QUESTIONS}}</div></div>
  </div>
  <div class="sep"></div>
  <div class="slogan">{{SLOGAN}}</div>
  <div class="footer">VaultForge v3.0.0</div>
</div>
</body></html>
